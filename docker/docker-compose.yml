services:
  napcat:
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - ACCOUNT=${NAPCAT_ACCOUNT:-}
      - WEBUI_TOKEN=${NAPCAT_WEBUI_TOKEN:-napcat}
    ports:
      - "${NAPCAT_WS_HOST_PORT:-10300}:3001"
      - "${NAPCAT_WEB_HOST_PORT:-10301}:6099"
    container_name: napcat
    restart: always
    image: ${NAPCAT_IMAGE:-mlikiowa/napcat-docker:latest}
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
    labels:
      - com.centurylinklabs.watchtower.enable=true

  ds2api:
    image: ${DS2API_IMAGE:-ghcr.io/cjackhwang/ds2api:v3.6.1}
    container_name: ds2api
    restart: always
    ports:
      - "${DS2API_HOST_PORT:-10302}:5001"
    volumes:
      - ./ds2api/config.json:/app/config.json
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=${DS2API_LOG_LEVEL:-INFO}
      - DS2API_ADMIN_KEY=${DS2API_ADMIN_KEY:-ds2api}
      - DS2API_CONFIG_PATH=${DS2API_CONFIG_PATH:-/app/config.json}
    labels:
      - com.centurylinklabs.watchtower.enable=true

  oh-bot:
    image: node:20-bookworm-slim
    container_name: oh-bot
    restart: always
    working_dir: /app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ADMIN_PORT=${ADMIN_PORT:-3100}
      - NAPCAT_WS_URL=${NAPCAT_WS_URL:-ws://napcat:3001}
    command: ["node", "dist/index.js"]
    depends_on:
      - napcat
      - ds2api
    expose:
      - "3100"
    volumes:
      - ../dist:/app/dist:ro
      - ../data:/app/data

  admin-web:
    image: nginx:1.27-alpine
    container_name: oh-bot-admin
    restart: always
    depends_on:
      - oh-bot
    ports:
      - "${ADMIN_WEB_HOST_PORT:-10303}:80"
    volumes:
      - ../admin/dist:/usr/share/nginx/html:ro
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  watchtower:
    image: containrrr/watchtower:latest
    container_name: oh-bot-watchtower
    profiles:
      - auto-update
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL_SECONDS:-86400}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
